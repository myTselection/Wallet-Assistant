<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="280" viewBox="0 0 1120 280" role="img" aria-labelledby="title desc">
  <title id="title">Wallet Assistant logo</title>
  <desc id="desc">Wallet Assistant wordmark with a wallet, card, voucher, and barcode brand icon.</desc>
  <defs>
    <linearGradient id="logo-bg" x1="35" y1="24" x2="242" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11b7d9"/>
      <stop offset="0.52" stop-color="#276ef1"/>
      <stop offset="1" stop-color="#102a56"/>
    </linearGradient>
    <linearGradient id="logo-card" x1="82" y1="68" x2="198" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9f7ff"/>
    </linearGradient>
    <linearGradient id="logo-voucher" x1="96" y1="148" x2="199" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd34d"/>
      <stop offset="1" stop-color="#ff7a59"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="312" y1="65" x2="910" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102a56"/>
      <stop offset="0.56" stop-color="#276ef1"/>
      <stop offset="1" stop-color="#11b7d9"/>
    </linearGradient>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#071a36" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="232" height="232" rx="54" fill="url(#logo-bg)"/>

  <g filter="url(#logo-shadow)">
    <path d="M84 88c0-13.3 10.7-24 24-24h66c13.3 0 24 10.7 24 24v10h-89c-13.8 0-25 11.2-25 25V88Z" fill="#baf3ff" opacity="0.82"/>
    <path d="M72 115c0-15.5 12.5-28 28-28h88c15.5 0 28 12.5 28 28v61c0 15.5-12.5 28-28 28h-88c-15.5 0-28-12.5-28-28v-61Z" fill="url(#logo-card)"/>
    <path d="M90 130c0-7.7 6.3-14 14-14h96v24h-96c-7.7 0-14-6.3-14-14v4Z" fill="#16335f" opacity="0.12"/>
    <path d="M72 138h122c12.2 0 22 9.8 22 22v16c0 15.5-12.5 28-28 28h-88c-15.5 0-28-12.5-28-28v-38Z" fill="#153760"/>
    <path d="M106 146h82c6.6 0 12 5.4 12 12v32H94v-32c0-6.6 5.4-12 12-12Z" fill="url(#logo-voucher)"/>
    <circle cx="94" cy="168" r="10" fill="#153760"/>
    <circle cx="200" cy="168" r="10" fill="#153760"/>
    <rect x="115" y="162" width="7" height="28" rx="2" fill="#153760"/>
    <rect x="128" y="162" width="4" height="28" rx="2" fill="#153760"/>
    <rect x="140" y="162" width="10" height="28" rx="2" fill="#153760"/>
    <rect x="157" y="162" width="5" height="28" rx="2" fill="#153760"/>
    <rect x="170" y="162" width="8" height="28" rx="2" fill="#153760"/>
    <path d="M179 76l5.8 12.2L198 94l-13.2 5.8L179 112l-5.8-12.2L160 94l13.2-5.8L179 76Z" fill="#ffffff"/>
    <path d="M96 68l3.5 7.4L108 79l-8.5 3.6L96 90l-3.5-7.4L84 79l8.5-3.6L96 68Z" fill="#ffd34d"/>
  </g>

  <g>
    <text x="304" y="123" fill="url(#wordmark)" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="0">Wallet Assistant</text>
    <text x="308" y="173" fill="#516276" font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="23" font-weight="600" letter-spacing="0">Loyalty cards, vouchers, and promotions in Home Assistant</text>
    <rect x="308" y="204" width="72" height="8" rx="4" fill="#11b7d9"/>
    <rect x="392" y="204" width="72" height="8" rx="4" fill="#ffd34d"/>
    <rect x="476" y="204" width="72" height="8" rx="4" fill="#ff7a59"/>
  </g>
</svg>
